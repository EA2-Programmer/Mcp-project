<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrakSYS — Live Tool Call Feed</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#222639;
    --border:rgba(255,255,255,0.08); --text:#e8eaf0; --muted:#8b90a8;
    --blue:#4f8ef7; --green:#34d399; --amber:#fbbf24; --red:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:24px;min-height:100vh}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .header h1{font-size:22px;font-weight:600}
  .live-badge{display:flex;align-items:center;gap:8px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:9999px;padding:6px 14px;font-size:13px;color:var(--green)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1} 50%{opacity:0.4}}

  .controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .search{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 14px;width:260px}
  .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer}
  .filter-btn.active{background:rgba(79,142,247,.15);border-color:var(--blue);color:var(--blue)}
  .count-badge{margin-left:auto;color:var(--muted);font-size:13px}

  .feed{display:flex;flex-direction:column;gap:10px}
  .call-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .call-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
  .call-header:hover{background:rgba(255,255,255,0.03)}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .ok{background:var(--green)}
  .err{background:var(--red)}
  .tool-name{font-family:monospace;font-size:14px;color:var(--blue);flex:1;overflow:hidden;text-overflow:ellipsis}
  .ts{font-size:12px;color:var(--muted)}
  .latency{padding:2px 8px;border-radius:4px;font-size:12px}
  .lat-fast{background:rgba(52,211,153,.15);color:var(--green)}
  .lat-slow{background:rgba(248,113,113,.15);color:var(--red)}

  .call-body{display:none;border-top:1px solid var(--border);padding:16px}
  .expanded .call-body{display:block}
  .json-viewer{background:var(--surface2);padding:14px;border-radius:8px;font-family:monospace;font-size:12.5px;line-height:1.6;overflow:auto;max-height:420px;white-space:pre-wrap}
  .table-wrap{max-height:380px;overflow:auto}
  .data-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .data-table th{background:var(--surface2);padding:8px 10px;text-align:left;color:var(--muted);font-size:11px}
  .data-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
  .data-table tr:hover td{background:rgba(255,255,255,.03)}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>TrakSYS MCP — Live Tool Call Feed</h1>
    <p>Real inputs & outputs from your manufacturing tools</p>
  </div>
  <div class="live-badge"><div class="dot"></div> LIVE from Langfuse</div>
</div>

<div class="controls">
  <input type="text" class="search" id="search" placeholder="Filter tool name..." onkeyup="filterFeed()">
  <button class="filter-btn active" onclick="setFilter(this,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(this,'success')">Success</button>
  <button class="filter-btn" onclick="setFilter(this,'error')">Errors</button>
  <span class="count-badge" id="count">0 calls</span>
  <button onclick="loadData()" style="margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 14px">↻ Refresh</button>
</div>

<div class="feed" id="feed">
  <div style="text-align:center;padding:60px;color:var(--muted)">Loading tool calls from Langfuse...</div>
</div>

<script>
// === CONFIGURE YOUR LANGFUSE PUBLIC KEY HERE ===
const LANGFUSE_PUBLIC_KEY = "pk-lf-7cd00197-fea9-4cff-b644-291504c8d95e";   // ← change if different
const BASE = "http://localhost:3000";

let allCalls = [];
let currentFilter = "all";

async function loadData() {
  document.getElementById("feed").innerHTML = `<div style="text-align:center;padding:60px;color:var(--muted)">Fetching latest tool calls...</div>`;
  try {
    const res = await fetch(`${BASE}/api/public/traces?limit=80&orderBy=timestamp&order=desc`, {
      headers: { "Authorization": "Basic " + btoa(LANGFUSE_PUBLIC_KEY + ":") }
    });
    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();
    const traces = data.data || [];

    allCalls = traces
      .filter(t => t.name && t.name.includes("tools/call"))
      .map(t => ({
        id: t.id,
        name: t.name.replace("tools/call_", "").replace("tools/call ", ""),
        timestamp: t.timestamp,
        input: t.input || {},
        output: t.output || {},
        latency: t.latency ? Math.round(t.latency * 1000) : null,
        isError: t.level === "ERROR" || (t.output && JSON.stringify(t.output).includes("error"))
      }));

    renderFeed();
  } catch(e) {
    document.getElementById("feed").innerHTML = `<div style="color:#f87171;padding:20px">Failed to connect to Langfuse.<br>${e.message}<br><br>Is Langfuse container running?</div>`;
  }
}

function renderFeed() {
  const searchTerm = document.getElementById("search").value.toLowerCase();

  const filtered = allCalls.filter(call => {
    if (searchTerm && !call.name.toLowerCase().includes(searchTerm)) return false;
    if (currentFilter === "success" && call.isError) return false;
    if (currentFilter === "error" && !call.isError) return false;
    return true;
  });

  document.getElementById("count").textContent = `${filtered.length} calls`;

  let html = "";
  filtered.forEach((call, i) => {
    const ts = new Date(call.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const lat = call.latency ? (call.latency < 2000 ? `<span class="latency lat-fast">${call.latency}ms</span>` : `<span class="latency lat-slow">${(call.latency/1000).toFixed(1)}s</span>`) : "";

    const tableHtml = renderTable(call.output);

    html += `
      <div class="call-card" onclick="this.classList.toggle('expanded')">
        <div class="call-header">
          <div class="status-dot ${call.isError ? 'err' : 'ok'}"></div>
          <div class="tool-name">${call.name}</div>
          <div class="ts">${ts}</div>
          ${lat}
        </div>
        <div class="call-body">
          <strong>Input:</strong><div class="json-viewer">${JSON.stringify(call.input, null, 2)}</div>
          <strong style="margin-top:12px;display:block">Output:</strong>
          ${tableHtml}
          <div class="json-viewer" style="margin-top:10px">${JSON.stringify(call.output, null, 2)}</div>
        </div>
      </div>`;
  });

  document.getElementById("feed").innerHTML = html || `<div style="text-align:center;padding:40px;color:var(--muted)">No tool calls found yet.<br>Make some queries in OpenWebUI first.</div>`;
}

function renderTable(output) {
  if (!output) return "<div style='color:var(--muted);padding:8px'>No data</div>";

  let arr = null;
  if (Array.isArray(output)) arr = output;
  else if (output && typeof output === "object") {
    for (let k in output) {
      if (Array.isArray(output[k]) && output[k].length > 0) {
        arr = output[k];
        break;
      }
    }
  }

  if (!arr || arr.length === 0) return "<div style='color:var(--muted);padding:8px'>No tabular data in this response</div>";

  const cols = Object.keys(arr[0]).slice(0, 10);
  let rowsHtml = arr.slice(0, 30).map(row =>
    `<tr>${cols.map(c => `<td title="${String(row[c]??'')}">${row[c]??''}</td>`).join('')}</tr>`
  ).join('');

  return `
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
    ${arr.length > 30 ? `<div style="font-size:11px;color:var(--muted);padding:6px 0">Showing first 30 of ${arr.length} rows</div>` : ''}
  `;
}

function setFilter(btn, filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function filterFeed() {
  renderFeed();
}

// Auto load
loadData();
setInterval(loadData, 25000);   // refresh every 25 seconds
</script>
</body>
</html>
