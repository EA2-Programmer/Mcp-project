# ══════════════════════════════════════════════════════════════════════════════
#  TrakSYS AI Stack — Updated docker-compose.yml
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Static Dashboard Server (Working) ──────────────────────────────────────
  static-assets:
    image: python:3.11-slim
    container_name: static-assets
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./tests:/app
    ports:
      - "5500:5500"
    command: python -m http.server 5500
    networks:
      - ai-stack

  # ── TrakSYS MCP Server (mcpo OpenAPI Proxy) ───────────────────────────
# ── TrakSYS Custom Agent (FastAPI + MCP Subprocess) ──────────────────────
  traksys-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traksys-agent
    restart: unless-stopped
    # CRITICAL: We run your custom agent API, which spawns the MCP server internally
    command: ["python", "traksys-agent/main.py"]
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./traksys-agent
          target: /app/traksys-agent
    ports:
      - "8000:8000"
    environment:
      - MSSQL_CONNECTION_STRING=Driver={ODBC Driver 17 for SQL Server};Server=host.docker.internal,1433;Database=EBR_Template;Trusted_Connection=no;UID=${MSSQL_USER:-sa};PWD=${MSSQL_PASSWORD:-}
      - PYTHONPATH=/app

      # Keys needed by your Agent (main.py)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5}

      # Transport must be stdio because main.py communicates with MCP via stdio
      - SERVER_TRANSPORT=stdio
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json

      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=http://langfuse-langfuse-web-1:3000
      - ENABLE_TRACING=true

    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-stack
      - langfuse_default

  # ── OpenWebUI ──────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3001:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-stack
    depends_on:
      - traksys-agent

  # ── Pipelines (OpenWebUI plugin host) ────────────────────────────────────
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    restart: unless-stopped
    ports:
      - "9099:9099"
    volumes:
      - pipelines-data:/app/pipelines
    environment:
      - PIPELINES_API_KEY=0p3n-w3bu!
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-stack
      - langfuse_default
    depends_on:
      - traksys-agent

networks:
  ai-stack:
    driver: bridge
  langfuse_default:
    external: true

volumes:
  open-webui-data:
  pipelines-data: